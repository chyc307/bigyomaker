<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老徐帥照生成器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .control-panel {
            background: white;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }
        .btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        .btn:hover {
            background-color: #2980b9;
        }
        .btn-export {
            background-color: #2ecc71;
        }
        .btn-export:hover {
            background-color: #27ae60;
        }
        .btn-flip {
            background-color: #9b59b6;
        }
        .btn-flip:hover {
            background-color: #8e44ad;
        }
        .stamp-container {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .stamp-preview {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border: 2px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .stamp-preview:hover {
            transform: scale(1.05);
            border-color: #3498db;
        }
        .canvas-container {
            margin-bottom: 30px !important;
        }
        .canvas-wrapper {
            background: #fff;
            border: 2px dashed #ccc;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        #upload-input {
            display: none;
        }
        .upload-label {
            background-color: #e67e22;
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        .upload-label:hover {
            background-color: #d35400;
        }
        .result-panel {
            display: none;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 90%;
            margin-top: 10px;
            margin-bottom: 40px; /* 留點空間給底部的版本號 */
        }
        .result-panel h3 {
            margin-top: 0;
            color: #27ae60;
        }
        .result-panel p {
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
        }
        #result-image {
            max-width: 100%;
            height: auto;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        /* 新增：版本號頁尾樣式 */
        .footer-version {
            color: #aaa;
            font-size: 12px;
            margin-top: 20px;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <h1>老徐帥照生成器</h1>

    <div class="control-panel">
        <label for="upload-input" class="upload-label">1. 上傳底圖</label>
        <input type="file" id="upload-input" accept="image/*">

        <div class="stamp-container">
            <span>2. 點擊加入老徐：</span>
            <img src="image1.png" id="stamp1" class="stamp-preview" title="點擊加入老徐 1" alt="Stamp 1">
            <img src="image2.png" id="stamp2" class="stamp-preview" title="點擊加入老徐 (無毛) 2" alt="Stamp 2">
            <img src="image3.png" id="stamp3" class="stamp-preview" title="點擊加入老徐 (卡通) 3" alt="Stamp 3">
        </div>

        <button class="btn btn-flip" id="btn-flip">水平反轉選中老徐</button>
        <button class="btn btn-export" id="btn-export">3. 生成並顯示圖片</button>
    </div>

    <div class="canvas-wrapper">
        <canvas id="main-canvas" width="800" height="600"></canvas>
    </div>

    <div class="result-panel" id="result-panel">
        <h3>🎉 高清圖片生成成功！</h3>
        <p>💡 提示：您現在可以對下方大圖點擊<b>右鍵複製/另存圖片</b>（或手機<b>長按圖片複製/另存圖片</b>），直接貼到聊天室超帥！</p>
        <img id="result-image" src="" alt="產出結果">
    </div>

    <div class="footer-version">Version 1.1.0<br>Developed by chyc307</div>

    <script>
        // 初始化 Canvas，啟用高 DPI 支援
        const canvas = new fabric.Canvas('main-canvas', {
            preserveObjectStacking: true,
            enableRetinaScaling: true 
        });

        const uploadInput = document.getElementById('upload-input');
        const stamp1 = document.getElementById('stamp1');
        const stamp2 = document.getElementById('stamp2');
        const stamp3 = document.getElementById('stamp3');
        const btnFlip = document.getElementById('btn-flip');
        const btnExport = document.getElementById('btn-export');
        const resultPanel = document.getElementById('result-panel');
        const resultImage = document.getElementById('result-image');

        // 1. 處理使用者上傳底圖
        uploadInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(f) {
                fabric.Image.fromURL(f.target.result, function(img) {
                    let displayWidth = window.innerWidth * 0.9;
                    if (displayWidth > 800) displayWidth = 800;
                    
                    const scaleFactor = displayWidth / img.width;
                    
                    canvas.setWidth(displayWidth);
                    canvas.setHeight(img.height * scaleFactor);

                    img.set({
                        scaleX: scaleFactor,
                        scaleY: scaleFactor
                    });

                    canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas));
                });
            };
            reader.readAsDataURL(file);
        });

        // 2. 點擊印章圖片時，將其加入到畫布中
        function addStampToCanvas(imgElement) {
            fabric.Image.fromURL(imgElement.src, function(img) {
                const initialWidth = canvas.width * 0.25; 
                img.scaleToWidth(initialWidth); 
                img.set({
                    left: canvas.width / 2 - (initialWidth / 2),
                    top: canvas.height / 2 - (initialWidth / 2),
                    cornerColor: '#3498db',
                    cornerSize: window.devicePixelRatio > 1 ? 15 : 10,
                    transparentCorners: false,
                    borderColor: '#3498db'
                });
                
                canvas.add(img);
                canvas.setActiveObject(img);
                canvas.renderAll();
            }, { crossOrigin: 'anonymous' });
        }

        stamp1.addEventListener('click', () => addStampToCanvas(stamp1));
        stamp2.addEventListener('click', () => addStampToCanvas(stamp2));
        stamp3.addEventListener('click', () => addStampToCanvas(stamp3));

        // 3. 水平反轉（鏡像）選中的印章
        btnFlip.addEventListener('click', () => {
            const activeObject = canvas.getActiveObject();
            if (activeObject && activeObject.type === 'image') {
                activeObject.set('flipX', !activeObject.flipX);
                canvas.renderAll();
            } else {
                alert('請先點擊選取畫布上的老徐圖片！');
            }
        });

        // 4. 匯出高清大圖
        btnExport.addEventListener('click', () => {
            canvas.discardActiveObject();
            canvas.renderAll();

            const dpr = window.devicePixelRatio || 1;

            const dataURL = canvas.toDataURL({
                format: 'png',
                quality: 1.0,
                multiplier: dpr 
            });

            resultImage.src = dataURL;
            resultPanel.style.display = 'block';
            
            setTimeout(() => {
                resultPanel.scrollIntoView({ behavior: 'smooth' });
            }, 100);
        });
    </script>
</body>
</html>
