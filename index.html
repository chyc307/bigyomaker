<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>老徐帥照產生器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 24px;
            text-align: center;
        }
        
        /* 控制面板：手機版預設上下堆疊 */
        .control-panel {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 820px;
            box-sizing: border-box;
        }
        
        .upload-wrapper {
            display: flex;
            justify-content: center;
            width: 100%;
        }
        
        #upload-input {
            display: none;
        }
        .upload-label {
            background-color: #e67e22;
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
        }
        .upload-label:hover {
            background-color: #d35400;
        }

        .stamp-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
        }
        .stamp-label-row {
            font-size: 14px;
            font-weight: bold;
            color: #444;
            text-align: center;
        }
        .hint-text {
            font-size: 12px;
            color: #e67e22;
            margin-top: 20px;
            font-weight: normal;
        }
        .stamp-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .stamp-preview {
            width: 55px;
            height: 55px;
            object-fit: cover;
            border: 2px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.2s;
            background: #fff;
        }
        .stamp-preview:hover {
            transform: scale(1.05);
            border-color: #3498db;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            width: 100%;
        }
        .btn {
            color: white;
            border: none;
            padding: 12px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
            flex: 1;
            text-align: center;
            font-weight: bold;
        }
        .btn-flip {
            background-color: #9b59b6;
        }
        .btn-flip:hover {
            background-color: #8e44ad;
        }
        .btn-export {
            background-color: #2ecc71;
        }
        .btn-export:hover {
            background-color: #27ae60;
        }
        
        /* 工作區域：包含編輯視窗與垃圾桶 */
        .workspace {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            width: 100%;
            max-width: 820px;
            box-sizing: border-box;
        }
        
        /* 核心優化：手機版編輯視窗往內縮，兩側留白方便手指滑動頁面 */
        .canvas-wrapper {
            background: #fff;
            border: 2px dashed #ccc;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 82%; /* 手機端向內縮小，左右留出 9% 的空間當作安全滑動滑道 */
            display: flex;
            justify-content: center;
            box-sizing: border-box;
        }
        
        .trash-zone {
            width: 82%; /* 與畫布同步縮小，維持視覺一體性 */
            height: 60px;
            background-color: #fee2e2;
            border: 2px dashed #ef4444;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #b91c1c;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.2s ease;
            cursor: pointer;
            box-sizing: border-box;
        }

        .result-panel {
            display: none;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 820px;
            box-sizing: border-box;
            margin-bottom: 40px;
        }
        .result-panel h3 {
            margin-top: 0;
            color: #27ae60;
            font-size: 18px;
        }
        .result-panel p {
            color: #666;
            font-size: 13px;
            margin-bottom: 15px;
            line-height: 1.4;
        }
        #result-image {
            max-width: 100%;
            height: auto;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .footer-version {
            color: #aaa;
            font-size: 11px;
            margin-top: 10px;
            margin-bottom: 10px;
            text-align: center;
            line-height: 1.5;
            letter-spacing: 0.5px;
        }

        /* 🖥️ 完美的電腦版響應式覆蓋 (RWD) */
        @media (min-width: 768px) {
            .control-panel {
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
                padding: 15px 25px;
            }
            .upload-wrapper {
                width: auto;
            }
            .upload-label {
                width: 120px;
            }
            .stamp-section {
                width: auto;
                flex: 1;
                margin-left: 20px;
                margin-right: 20px;
            }
            .stamp-label-row {
                text-align: left;
            }
            .stamp-container {
                justify-content: flex-start;
            }
            .btn-group {
                width: auto;
                flex-direction: row;
            }
            .btn {
                flex: none;
                width: 110px;
            }
            /* 電腦版不需要留側邊滑道，還原為滿版 100% 寬度 */
            .canvas-wrapper {
                width: 100%;
            }
            .trash-zone {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <h1>老徐帥照產生器</h1>

    <div class="control-panel">
        <div class="upload-wrapper">
            <label for="upload-input" class="upload-label">1. 上傳底圖</label>
            <input type="file" id="upload-input" accept="image/*">
        </div>

        <div class="stamp-section">
            <div class="stamp-label-row">
                2. 點擊加入老徐：
                <div class="hint-text">💡 提示：可連續點擊，一次疊加多張老徐</div>
            </div>
            <div class="stamp-container">
                <img src="image1.png" id="stamp1" class="stamp-preview" title="點擊加入老徐 (經典)" alt="Stamp 1" crossorigin="anonymous">
                <img src="image2.png" id="stamp2" class="stamp-preview" title="點擊加入老徐 (無毛)" alt="Stamp 2" crossorigin="anonymous">
                <img src="image3.png" id="stamp3" class="stamp-preview" title="點擊加入老徐 (卡通)" alt="Stamp 3" crossorigin="anonymous">
                <img src="image4.png" id="stamp4" class="stamp-preview" title="點擊加入老徐 (後腦)" alt="Stamp 4" crossorigin="anonymous">
                <img src="image5.png" id="stamp5" class="stamp-preview" title="點擊加入老徐 (頭髮)" alt="Stamp 5" crossorigin="anonymous">
            </div>
        </div>

        <div class="btn-group">
            <button class="btn btn-flip" id="btn-flip">水平反轉</button>
            <button class="btn btn-export" id="btn-export">3. 產生圖片</button>
        </div>
    </div>

    <div class="workspace">
        <div class="canvas-wrapper">
            <canvas id="main-canvas" width="800" height="600"></canvas>
        </div>
        
        <div class="trash-zone" id="trash-zone">
            🗑️ 拖曳老徐到這裡刪除
        </div>
    </div>

    <div class="result-panel" id="result-panel">
        <h3>🎉 帥照產生成功！</h3>
        <p>💡 提示：對下方大圖點擊<b>右鍵複製/另存圖片</b>（或手機<b>長按圖片複製/另存圖片</b>）儲存！</p>
        <img id="result-image" src="" alt="產出結果">
    </div>

    <div class="footer-version">Version 2.5.0<br>Developed by chyc307</div>

    <script>
        const canvas = new fabric.Canvas('main-canvas', {
            preserveObjectStacking: true,
            enableRetinaScaling: true 
        });

        const uploadInput = document.getElementById('upload-input');
        const stamp1 = document.getElementById('stamp1');
        const stamp2 = document.getElementById('stamp2');
        const stamp3 = document.getElementById('stamp3');
        const stamp4 = document.getElementById('stamp4');
        const stamp5 = document.getElementById('stamp5');
        const btnFlip = document.getElementById('btn-flip');
        const btnExport = document.getElementById('btn-export');
        const resultPanel = document.getElementById('result-panel');
        const resultImage = document.getElementById('result-image');
        const trashZone = document.getElementById('trash-zone');

        // 1. 處理使用者上傳底圖 (自適應當前畫布外層容器寬度)
        uploadInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(f) {
                fabric.Image.fromURL(f.target.result, function(img) {
                    // 根據當前 wrapper 的寬度來設定畫布物理大小
                    const wrapper = document.querySelector('.canvas-wrapper');
                    let displayWidth = wrapper.clientWidth - 4; // 扣除邊框
                    
                    const scaleFactor = displayWidth / img.width;
                    
                    canvas.setWidth(displayWidth);
                    canvas.setHeight(img.height * scaleFactor);

                    img.set({
                        scaleX: scaleFactor,
                        scaleY: scaleFactor
                    });

                    canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas));
                }, { crossOrigin: 'anonymous' });
            };
            reader.readAsDataURL(file);
        });

        // 2. 點擊印章圖片時，將其加入到畫布中
        function addStampToCanvas(imgElement) {
            fabric.Image.fromURL(imgElement.src, function(img) {
                if (!img) {
                    alert('圖片載入失敗，請確認檔案名稱與路徑是否正確！');
                    return;
                }
                const initialWidth = canvas.width * 0.25; 
                img.scaleToWidth(initialWidth); 
                img.set({
                    left: canvas.width / 2 - (initialWidth / 2) + (Math.random() * 30 - 15), 
                    top: canvas.height / 2 - (initialWidth / 2) + (Math.random() * 30 - 15),
                    cornerColor: '#3498db',
                    cornerSize: window.devicePixelRatio > 1 ? 15 : 10,
                    transparentCorners: false,
                    borderColor: '#3498db'
                });
                
                canvas.add(img);
                canvas.setActiveObject(img);
                canvas.renderAll();
            }, { crossOrigin: 'anonymous' });
        }

        stamp1.addEventListener('click', () => addStampToCanvas(stamp1));
        stamp2.addEventListener('click', () => addStampToCanvas(stamp2));
        stamp3.addEventListener('click', () => addStampToCanvas(stamp3));
        stamp4.addEventListener('click', () => addStampToCanvas(stamp4));
        stamp5.addEventListener('click', () => addStampToCanvas(stamp5));

        // 偵測拖曳物件是否進入垃圾桶範圍並刪除
        canvas.on('mouse:up', function(options) {
            const activeObject = canvas.getActiveObject();
            if (!activeObject) return;

            const pointerEvent = options.e;
            let clientX = pointerEvent.clientX;
            let clientY = pointerEvent.clientY;

            if (pointerEvent.touches && pointerEvent.touches.length > 0) {
                clientX = pointerEvent.touches[0].clientX;
                clientY = pointerEvent.touches[0].clientY;
            } else if (pointerEvent.changedTouches && pointerEvent.changedTouches.length > 0) {
                clientX = pointerEvent.changedTouches[0].clientX;
                clientY = pointerEvent.changedTouches[0].clientY;
            }

            const trashRect = trashZone.getBoundingClientRect();

            if (
                clientX >= trashRect.left &&
                clientX <= trashRect.right &&
                clientY >= trashRect.top &&
                clientY <= trashRect.bottom
            ) {
                if (activeObject.type === 'activeSelection') {
                    activeObject.forEachObject(function(obj) {
                        canvas.remove(obj);
                    });
                    canvas.discardActiveObject();
                } else {
                    canvas.remove(activeObject);
                }
                canvas.renderAll();
                
                trashZone.style.backgroundColor = '#fca5a5';
                setTimeout(() => { trashZone.style.backgroundColor = '#fee2e2'; }, 200);
            }
        });

        // 3. 水平反轉（鏡像）選中的印章
        btnFlip.addEventListener('click', () => {
            const activeObject = canvas.getActiveObject();
            if (activeObject) {
                if (activeObject.type === 'activeSelection') {
                    activeObject.forEachObject(function(obj) {
                        obj.set('flipX', !obj.flipX);
                    });
                } else {
                    activeObject.set('flipX', !activeObject.flipX);
                }
                canvas.renderAll();
            } else {
                alert('請先點擊選取畫布上的老徐圖片！');
            }
        });

        // 4. 匯出高清大圖
        btnExport.addEventListener('click', () => {
            canvas.discardActiveObject();
            canvas.renderAll();

            const dpr = window.devicePixelRatio || 1;

            const dataURL = canvas.toDataURL({
                format: 'png',
                quality: 1.0,
                multiplier: dpr 
            });

            resultImage.src = dataURL;
            resultPanel.style.display = 'block';
            
            setTimeout(() => {
                resultPanel.scrollIntoView({ behavior: 'smooth' });
            }, 100);
        });
    </script>
</body>
</html>
